<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            -webkit-app-region: drag;
        }
        .launcher {
            width: 60px;
            height: 60px;
            background: #4A7B4F;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            -webkit-app-region: no-drag;
            border: 3px solid white;
        }
        .launcher:hover {
            transform: scale(1.1);
            background: #5C8A5A;
        }
        .launcher img {
            width: 35px;
            height: 35px;
            object-fit: contain;
        }
        /* Pulse animation */
        .launcher::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #4A7B4F;
            animation: pulse 2s infinite;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="launcher" id="launcherBtn">
        <img src="mamba.png" alt="M">
    </div>
    <script>
        document.getElementById('launcherBtn').addEventListener('click', () => {
            window.mambaAPI.toggleWidget();
        });
    </script>
</body>
</html>
